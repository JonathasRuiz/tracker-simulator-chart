apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.global.appName }}-secrets
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation  
type: Opaque
stringData:
  GOOGLE_ROUTES_API_KEY: {{ .Values.global.secrets.googleMapsApiKey | quote }}
  REACT_APP_GOOGLE_MAPS_API_KEY: {{ .Values.global.secrets.googleMapsApiKey | quote }}