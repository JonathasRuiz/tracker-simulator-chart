apiVersion: v1
kind: Service
metadata:
  annotations:
    version: 1.34.0
  labels:
    app: trackerclient
  name: trackerclient
spec:
  ports:
    - name: metrics
      port: {{ .Values.trackerClient.port }}
      targetPort: {{ .Values.trackerClient.port }}
      protocol: TCP
    - name: "grpc"
      port: {{ .Values.trackerClient.grpcPort }}
      targetPort: {{ .Values.trackerClient.grpcPort }}
  selector:
    app: trackerclient