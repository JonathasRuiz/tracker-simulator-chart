apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.global.appName }}-communications-app-config
data:
  REACT_APP_SERVER_URL: {{ .Values.communicationsApp.host | quote }}
  REACT_APP_SERVER_PORT: {{ .Values.communicationsApp.serverPort | quote }}
  REACT_APP_TRACKER_PORT: {{ .Values.communicationsApp.trackerApp.port | quote }}
  REACT_APP_TRACKER_CLIENT: {{ .Values.communicationsApp.trackerClientApp.port | quote }}
  REACT_APP_TRACKER_SERVER_GO_PORT: "9999" # Not used in this app, but defined for consistency
  REACT_APP_TRACKER_CLIENT_GO_PORT: "9999" # Not used in this app, but defined for consistency
  REACT_APP_TRACKER_ANALYTICS_PORT: {{ .Values.communicationsApp.trackerAnalyticsApp.port | quote }}
  REACT_APP_MQTT_WS_URL: {{ .Values.communicationsApp.mqttWsUrl | quote }}
  REACT_APP_WS_CLIENT_HOST: "localhost" # Not used in this app, but defined for consistency
  REACT_APP_WS_CLIENT_PORT: "9999" # Not used in this app, but defined for consistency
  REACT_APP_WS_SERVER_HOST: "localhost" # Not used in this app, but defined for consistency
  REACT_APP_WS_SERVER_PORT: "9999" # Not used in this app, but defined for consistency